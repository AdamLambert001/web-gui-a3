<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login - Arma 3 Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
          sans-serif;
        background-color: #0f172a;
        color: #e5e7eb;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .card {
        width: 100%;
        max-width: 360px;
        background: #020617;
        border-radius: 0.75rem;
        box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.9);
        border: 1px solid #1e293b;
        padding: 1.75rem 1.9rem 1.9rem;
      }

      h1 {
        font-size: 1.3rem;
        margin: 0 0 0.75rem;
      }

      p {
        margin: 0 0 1.25rem;
        font-size: 0.9rem;
        color: #9ca3af;
      }

      label {
        display: block;
        font-size: 0.85rem;
        margin-bottom: 0.25rem;
      }

      input[type='text'],
      input[type='password'] {
        width: 100%;
        padding: 0.5rem 0.6rem;
        border-radius: 0.5rem;
        border: 1px solid #1f2937;
        background: #020617;
        color: #e5e7eb;
        font-size: 0.9rem;
        box-sizing: border-box;
      }

      input:focus {
        outline: none;
        border-color: #22c55e;
        box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.6);
      }

      .field {
        margin-bottom: 0.9rem;
      }

      button {
        width: 100%;
        margin-top: 0.35rem;
        border-radius: 999px;
        border: none;
        padding: 0.5rem 0.9rem;
        font-size: 0.95rem;
        cursor: pointer;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
        transition: background-color 0.1s ease, transform 0.05s ease,
          box-shadow 0.1s ease;
        background: #22c55e;
        color: #022c22;
        box-shadow: 0 10px 25px -10px rgba(34, 197, 94, 0.7);
      }

      button:hover {
        background: #16a34a;
      }

      button:active {
        transform: translateY(1px);
      }

      .hint {
        margin-top: 0.75rem;
        font-size: 0.75rem;
        color: #6b7280;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Arma 3 Control Login</h1>
      <p>Sign in to access the server control panel.</p>
      <form method="post" action="/login">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="off" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
          />
        </div>
        <button type="submit">Sign in</button>
      </form>
      <div class="hint">
        Default login is <code>admin / password</code>. Change this in your
        <code>.env</code>.
      </div>
    </div>
  </body>
  </html>
